supergraph:
  listen: 0.0.0.0:4000
  introspection: true

health_check:
  listen: 0.0.0.0:8088
  enabled: true

sandbox:
  enabled: true

homepage:
  enabled: false

headers:
  all:
    request:
      - propagate:
          named: "x-user-id"
      - propagate:
          named: "x-user-tier"
      - propagate:
          named: "x-profile-id"



cors:
  origins:
    - "*"
  allow_headers:
    - content-type
    - authorization
  methods:
    - GET
    - POST
    - OPTIONS
