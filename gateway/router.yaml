supergraph:
  listen: 0.0.0.0:3000
  introspection: true

health_check:
  listen: 0.0.0.0:8088
  enabled: true

sandbox:
  enabled: true

homepage:
  enabled: false

include_subgraph_errors:
  all: true

headers:
  all:
    request:
      - propagate:
          named: "authorization"
      - propagate:
          named: "x-user-id"
      - propagate:
          named: "x-user-tier"
      - propagate:
          named: "x-profile-id"

cors:
  allow_any_origin: true
  allow_headers:
    - content-type
    - authorization
  methods:
    - GET
    - POST
    - OPTIONS
