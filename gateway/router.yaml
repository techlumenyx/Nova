supergraph:
  listen: 0.0.0.0:4000

health_check:
  enabled: true
  path: /.well-known/apollo/server-health

sandbox:
  enabled: true

introspection: true

homepage:
  enabled: false

headers:
  all:
    request:
      - propagate:
          named: "x-user-id"
      - propagate:
          named: "x-user-tier"
      - propagate:
          named: "x-profile-id"

limits:
  max_depth: 10
  max_aliases: 15

cors:
  origins:
    - "*"
  allow_headers:
    - content-type
    - authorization
  methods:
    - GET
    - POST
    - OPTIONS
