extend schema
  @link(url: "https://specs.apollo.dev/federation/v2.7", import: ["@key", "@external"])

scalar DateTime
scalar Date

type Mutation {
  setupProfile(input: SetupProfileInput!): Profile!
  updateProfile(input: UpdateProfileInput!): Profile!
}

input SetupProfileInput {
  dateOfBirth: Date
  gender:      Gender
  heightValue: Float
  weightValue: Float
  heightUnit:  HeightUnit
  weightUnit:  WeightUnit
  city:        String
  language:    Language
  conditions:  [String!]
  medications: [MedicationInput!]
  allergies:   AllergiesInput
}

input UpdateProfileInput {
  dateOfBirth: Date
  gender:      Gender
  heightValue: Float
  weightValue: Float
  heightUnit:  HeightUnit
  weightUnit:  WeightUnit
  city:        String
  language:    Language
  conditions:  [String!]
  medications: [MedicationInput!]
  allergies:   AllergiesInput
}

input MedicationInput {
  name:   String!
  dosage: String!
}

input AllergiesInput {
  drugs:         [String!]
  food:          [String!]
  environmental: [String!]
}

type Query {
  myProfile: Profile
}

type Profile @key(fields: "id") {
  id:          ID!
  userId:      ID!
  dateOfBirth: Date
  gender:      Gender
  heightValue: Float
  weightValue: Float
  heightUnit:  HeightUnit!
  weightUnit:  WeightUnit!
  bmi:         Float
  city:        String
  language:    Language
  conditions:  [String!]!
  medications: [Medication!]!
  allergies:   Allergies
  isComplete:  Boolean!
  createdAt:   DateTime!
  updatedAt:   DateTime!
}

type Medication {
  name:   String!
  dosage: String!
}

type Allergies {
  drugs:         [String!]!
  food:          [String!]!
  environmental: [String!]!
}

type User @key(fields: "id") {
  id:      ID! @external
  profile: Profile
}

enum Gender {
  MALE
  FEMALE
  OTHER
}

enum HeightUnit {
  CM
  FEET
}

enum WeightUnit {
  KG
  LBS
}

enum Language {
  EN
  HI
  HINGLISH
}
