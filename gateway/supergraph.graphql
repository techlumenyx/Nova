}

input UpdateProfileInput
  @join__type(graph: PROFILE)
{
  dateOfBirth: Date
  gender: Gender
  heightValue: Float
  weightValue: Float
  heightUnit: HeightUnit
  weightUnit: WeightUnit
}

type User
  @join__type(graph: AUTH, key: "id")
  @join__type(graph: PROFILE, key: "id")
