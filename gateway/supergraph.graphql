  id: ID! @join__field(graph: AUTH) @join__field(graph: PROFILE, external: true)
  name: String! @join__field(graph: AUTH)
  email: String @join__field(graph: AUTH)
  phone: String @join__field(graph: AUTH)
  emailVerified: Boolean! @join__field(graph: AUTH)
  phoneVerified: Boolean! @join__field(graph: AUTH)
  language: Language! @join__field(graph: AUTH)
  authProvider: AuthProvider! @join__field(graph: AUTH)
