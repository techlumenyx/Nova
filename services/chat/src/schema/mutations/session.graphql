type Mutation {
  startSession: StartSessionResult!
  sendMessage(sessionId: ID!, message: String!): SendMessageAck!
  submitFollowUp(sessionId: ID!, outcome: FollowUpOutcome!, doctorDiagnosis: String): DiagnosisSession!
}

union StartSessionResult = DiagnosisSession | ProfileIncompleteError

type ProfileIncompleteError {
  message: String!
  missingFields: [String!]!
}
