type Mutation {
  setupProfile(input: SetupProfileInput!): Profile!
}

input SetupProfileInput {
  dateOfBirth: Date
  gender:      Gender
  heightValue: Float
  weightValue: Float
  heightUnit:  HeightUnit
  weightUnit:  WeightUnit
  city:        String
  language:    Language
  conditions:  [String!]
  medications: [MedicationInput!]
  allergies:   AllergiesInput
}

input MedicationInput {
  name:   String!
  dosage: String!
}

input AllergiesInput {
  drugs:         [String!]
  food:          [String!]
  environmental: [String!]
}
