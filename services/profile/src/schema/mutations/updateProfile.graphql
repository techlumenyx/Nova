type Mutation {
  updateProfile(input: UpdateProfileInput!): Profile!
}

input UpdateProfileInput {
  dateOfBirth: Date
  gender:      Gender
  heightValue: Float
  weightValue: Float
  heightUnit:  HeightUnit
  weightUnit:  WeightUnit
  city:        String
  language:    Language
  conditions:  [String!]
  medications: [MedicationInput!]
  allergies:   AllergiesInput
}
