type Profile @key(fields: "id") {
  id:          ID!
  userId:      ID!
  dateOfBirth: Date
  gender:      Gender
  heightValue: Float
  weightValue: Float
  heightUnit:  HeightUnit!
  weightUnit:  WeightUnit!
  bmi:         Float
  city:        String
  language:    Language
  conditions:  [String!]!
  medications: [Medication!]!
  allergies:   Allergies
  isComplete:  Boolean!
  createdAt:   DateTime!
  updatedAt:   DateTime!
}

type Medication {
  name:   String!
  dosage: String!
}

type Allergies {
  drugs:         [String!]!
  food:          [String!]!
  environmental: [String!]!
}

enum Gender {
  MALE
  FEMALE
  OTHER
}

enum HeightUnit {
  CM
  FEET
}

enum WeightUnit {
  KG
  LBS
}

enum Language {
  EN
  HI
  HINGLISH
}
