<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova — Chat Pipeline Test</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0f1117;
    --surface:  #1a1d27;
    --border:   #2a2d3a;
    --primary:  #6c63ff;
    --danger:   #e05c5c;
    --success:  #4caf84;
    --warn:     #f0a033;
    --text:     #e0e0e8;
    --muted:    #6b6d7e;
    --user-bg:  #6c63ff22;
    --ai-bg:    #1e2130;
    --radius:   12px;
    --font:     -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    overflow: hidden;
  }

  /* ── Sidebar ─────────────────────────────────────────────────────────── */
  #sidebar {
    width: 300px;
    min-width: 300px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    padding: 20px 16px;
    gap: 14px;
  }

  #sidebar h2 {
    font-size: 15px;
    font-weight: 700;
    color: var(--primary);
    letter-spacing: .5px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
  .field input, .field select, .field textarea {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 8px 10px;
    font-size: 13px;
    font-family: var(--font);
    outline: none;
    width: 100%;
    transition: border-color .15s;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    border-color: var(--primary);
  }
  .field textarea { resize: vertical; min-height: 60px; }
  .field select option { background: #1a1d27; }

  .sep { border: none; border-top: 1px solid var(--border); }

  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .4px;
  }
  .badge-primary { background: #6c63ff33; color: var(--primary); }
  .badge-success { background: #4caf8422; color: var(--success); }
  .badge-warn    { background: #f0a03322; color: var(--warn);    }
  .badge-danger  { background: #e05c5c22; color: var(--danger);  }

  #session-info {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  #session-info .row { display: flex; justify-content: space-between; align-items: center; }
  #session-info .label { color: var(--muted); }

  #ws-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    display: inline-block;
    margin-right: 5px;
    transition: background .3s;
  }
  #ws-dot.connected    { background: var(--success); }
  #ws-dot.connecting   { background: var(--warn); animation: pulse .8s infinite; }
  #ws-dot.disconnected { background: var(--danger); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  /* ── Buttons ─────────────────────────────────────────────────────────── */
  .btn {
    border: none;
    border-radius: 8px;
    padding: 9px 16px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .15s, transform .1s;
    width: 100%;
    font-family: var(--font);
  }
  .btn:active { transform: scale(.98); }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-danger  { background: var(--danger);  color: #fff; }
  .btn-ghost   { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-primary:hover:not(:disabled) { opacity: .88; }
  .btn-danger:hover:not(:disabled)  { opacity: .88; }

  /* ── Main chat area ──────────────────────────────────────────────────── */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  #topbar h1 { font-size: 15px; font-weight: 700; flex: 1; }
  #topbar .meta { font-size: 11px; color: var(--muted); }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .msg {
    max-width: 75%;
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: 14px;
    line-height: 1.6;
    word-break: break-word;
    white-space: pre-wrap;
  }
  .msg-user {
    align-self: flex-end;
    background: var(--user-bg);
    border: 1px solid #6c63ff44;
    color: var(--text);
  }
  .msg-ai {
    align-self: flex-start;
    background: var(--ai-bg);
    border: 1px solid var(--border);
  }
  .msg-sys {
    align-self: center;
    background: transparent;
    border: 1px dashed var(--border);
    color: var(--muted);
    font-size: 12px;
    max-width: 90%;
    text-align: center;
    padding: 6px 14px;
  }
  .msg-emergency {
    align-self: flex-start;
    background: #e05c5c18;
    border: 1px solid var(--danger);
    color: #ffaaaa;
    max-width: 85%;
  }
  .msg-complete {
    align-self: flex-start;
    background: #4caf8415;
    border: 1px solid var(--success);
    max-width: 90%;
  }

  .msg-header {
    font-size: 10px;
    color: var(--muted);
    margin-bottom: 4px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .4px;
  }

  /* Markdown-lite rendering */
  .msg b, .msg strong { color: #b8b4ff; }
  .msg em, .msg i     { color: var(--muted); font-style: italic; }

  /* ── Input bar ───────────────────────────────────────────────────────── */
  #input-bar {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    gap: 10px;
    align-items: flex-end;
    flex-shrink: 0;
  }
  #input-bar textarea {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    padding: 10px 14px;
    resize: none;
    outline: none;
    max-height: 120px;
    line-height: 1.5;
    transition: border-color .15s;
  }
  #input-bar textarea:focus { border-color: var(--primary); }
  #input-bar textarea::placeholder { color: var(--muted); }
  #send-btn {
    background: var(--primary);
    border: none;
    border-radius: 10px;
    color: #fff;
    width: 44px;
    height: 44px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
    transition: opacity .15s;
  }
  #send-btn:hover:not(:disabled) { opacity: .85; }
  #send-btn:disabled { opacity: .35; cursor: not-allowed; }

  /* ── Spinner ────────────────────────────────────────────────────────── */
  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid #ffffff44;
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin .6s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Typing indicator ───────────────────────────────────────────────── */
  #typing {
    align-self: flex-start;
    background: var(--ai-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
    display: none;
  }
  #typing .dot {
    display: inline-block;
    width: 7px; height: 7px;
    background: var(--muted);
    border-radius: 50%;
    margin: 0 2px;
    animation: bounce .9s infinite ease-in-out;
  }
  #typing .dot:nth-child(2) { animation-delay: .15s; }
  #typing .dot:nth-child(3) { animation-delay: .30s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-6px); }
  }

  /* ── Scrollbar ──────────────────────────────────────────────────────── */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

  .quick-msg {
    align-self: flex-start;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    max-width: 90%;
  }
  .quick-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--text);
    cursor: pointer;
    font-family: var(--font);
    font-size: 12px;
    padding: 5px 12px;
    transition: border-color .15s, color .15s;
  }
  .quick-btn:hover { border-color: var(--primary); color: var(--primary); }
</style>
</head>
<body>

<!-- ── Sidebar ─────────────────────────────────────────────────────────────── -->
<aside id="sidebar">
  <h2>🩺 Nova Test Client</h2>

  <div class="field">
    <label>Server (HTTP)</label>
    <input id="server-url" value="http://localhost:4004/graphql">
  </div>
  <div class="field">
    <label>Server (WS)</label>
    <input id="ws-url" value="ws://localhost:4004/graphql">
  </div>

  <hr class="sep">
  <h2>Patient Profile</h2>

  <div class="field">
    <label>User ID</label>
    <input id="user-id" value="test-user-001" placeholder="any string">
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
    <div class="field">
      <label>Age</label>
      <input id="age" type="number" value="28" min="1" max="120">
    </div>
    <div class="field">
      <label>Sex</label>
      <select id="sex">
        <option value="MALE">Male</option>
        <option value="FEMALE">Female</option>
        <option value="OTHER">Other</option>
      </select>
    </div>
  </div>
  <div class="field">
    <label>Name</label>
    <input id="name" value="Ravi Sharma">
  </div>
  <div class="field">
    <label>City</label>
    <input id="city" value="Mumbai">
  </div>
  <div class="field">
    <label>Language</label>
    <select id="language">
      <option value="EN">English</option>
      <option value="HI">Hindi</option>
      <option value="HINGLISH">Hinglish</option>
    </select>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
    <div class="field">
      <label>Height (cm)</label>
      <input id="height" type="number" value="175">
    </div>
    <div class="field">
      <label>Weight (kg)</label>
      <input id="weight" type="number" value="70">
    </div>
  </div>
  <div class="field">
    <label>Known conditions (comma-sep)</label>
    <input id="conditions" placeholder="e.g. Diabetes, Asthma">
  </div>
  <div class="field">
    <label>Medications (name:dosage, ...)</label>
    <input id="medications" placeholder="e.g. Metformin:500mg, Aspirin:75mg">
  </div>

  <hr class="sep">

  <button class="btn btn-primary" id="start-btn" onclick="startSession()">
    Start Session
  </button>
  <button class="btn btn-ghost" id="reset-btn" onclick="resetSession()">
    Reset
  </button>

  <hr class="sep">
  <h2>Session</h2>
  <div id="session-info">
    <div class="row"><span class="label">ID</span><span id="si-id" style="font-size:10px;color:#888">—</span></div>
    <div class="row"><span class="label">Stage</span><span id="si-stage">—</span></div>
    <div class="row"><span class="label">Status</span><span id="si-status">—</span></div>
    <div class="row"><span class="label">Last Action</span><span id="si-action">—</span></div>
    <div class="row">
      <span class="label">Subscription</span>
      <span><span id="ws-dot"></span><span id="ws-label" style="font-size:11px;color:var(--muted)">—</span></span>
    </div>
  </div>
</aside>

<!-- ── Main ────────────────────────────────────────────────────────────────── -->
<main id="main">
  <div id="topbar">
    <h1>Chat Pipeline Test</h1>
    <span class="meta">Direct subgraph · subscriptions via graphql-ws</span>
  </div>

  <div id="messages">
    <div class="msg msg-sys">
      Configure the patient profile on the left, then click <strong>Start Session</strong>.
    </div>
  </div>

  <div id="typing">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
  </div>

  <div id="input-bar">
    <textarea id="msg-input" rows="1" placeholder="Type a symptom or message… (Enter to send)"
      onkeydown="handleKey(event)" oninput="autoResize(this)" disabled></textarea>
    <button id="send-btn" onclick="sendMessage()" disabled>➤</button>
  </div>
</main>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
let sessionId     = null;
let sessionStage  = 0;
let sessionStatus = '';
let ws            = null;        // raw WebSocket
let wsSubId       = null;        // graphql-ws subscription id
let wsReady       = false;       // connection_ack received

// ── graphql-ws protocol constants ─────────────────────────────────────────────
const GQL_CONNECTION_INIT = 'connection_init';
const GQL_CONNECTION_ACK  = 'connection_ack';
const GQL_SUBSCRIBE       = 'subscribe';
const GQL_NEXT            = 'next';
const GQL_ERROR           = 'error';
const GQL_COMPLETE        = 'complete';
const GQL_PING            = 'ping';
const GQL_PONG            = 'pong';

// ── WebSocket helpers ─────────────────────────────────────────────────────────
function wsSend(msg) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(msg));
  }
}

function setWsState(state) {
  const dot   = document.getElementById('ws-dot');
  const label = document.getElementById('ws-label');
  dot.className = state;
  const labels = { connected: 'Connected', connecting: 'Connecting…', disconnected: 'Disconnected' };
  label.textContent = labels[state] ?? '—';
}

function openSubscription(sid) {
  const wsUrl  = document.getElementById('ws-url').value.trim();
  const userId = document.getElementById('user-id').value.trim();
  const profile = buildProfile();

  if (ws) { ws.close(); ws = null; }

  setWsState('connecting');
  ws = new WebSocket(wsUrl, 'graphql-transport-ws');
  wsReady = false;

  ws.onopen = () => {
    // Send connection_init with auth params
    wsSend({
      type: GQL_CONNECTION_INIT,
      payload: {
        'x-user-id':      userId,
        'x-user-profile': JSON.stringify(profile),
      },
    });
  };

  ws.onmessage = (event) => {
    let msg;
    try { msg = JSON.parse(event.data); } catch { return; }

    switch (msg.type) {
      case GQL_CONNECTION_ACK:
        wsReady = true;
        setWsState('connected');
        subscribeToSession(sid);
        break;

      case GQL_PING:
        wsSend({ type: GQL_PONG });
        break;

      case GQL_NEXT:
        handleSubscriptionEvent(msg.payload?.data?.sessionUpdated);
        break;

      case GQL_ERROR:
        console.error('[WS] Subscription error', msg.payload);
        addSystemMsg(`⚠️ Subscription error: ${JSON.stringify(msg.payload)}`);
        showTyping(false);
        enableInput(true);
        break;

      case GQL_COMPLETE:
        setWsState('disconnected');
        break;
    }
  };

  ws.onerror = (err) => {
    console.error('[WS] Error', err);
    setWsState('disconnected');
  };

  ws.onclose = () => {
    setWsState('disconnected');
    wsReady = false;
  };
}

function subscribeToSession(sid) {
  wsSubId = 'sub-' + Date.now();
  wsSend({
    id:   wsSubId,
    type: GQL_SUBSCRIBE,
    payload: {
      query: `
        subscription SessionUpdated($sessionId: ID!) {
          sessionUpdated(sessionId: $sessionId) {
            sessionId type message stage status requiresAction
            output {
              severity action actionDetail disclaimer language
              probableCauses { condition confidence explanation }
              labTestsRecommended { testName slug reason urgency }
              homeRemedies { nameEn preparationEn }
              watchFor
            }
          }
        }
      `,
      variables: { sessionId: sid },
    },
  });
}

function closeSubscription() {
  if (ws && wsSubId) {
    wsSend({ id: wsSubId, type: GQL_COMPLETE });
    wsSubId = null;
  }
  if (ws) { ws.close(); ws = null; }
  setWsState('disconnected');
}

// ── Handle incoming subscription events ──────────────────────────────────────
function handleSubscriptionEvent(evt) {
  if (!evt) return;

  sessionStage  = evt.stage;
  sessionStatus = evt.status;
  updateSidebar({ action: evt.requiresAction });

  const isEmergency = evt.requiresAction === 'EMERGENCY' || evt.type === 'ESCALATED';
  const isComplete  = evt.status === 'COMPLETED' || evt.type === 'COMPLETED';

  const msgClass = isEmergency ? 'msg-emergency'
                 : isComplete  ? 'msg-complete'
                 : 'msg-ai';

  showTyping(false);

  if (evt.message) {
    addMessage('ai', evt.message, msgClass);
  }

  if (isComplete) {
    addSystemMsg('✅ Session complete · Follow-up scheduled in 48 hours');
    enableInput(false);
    closeSubscription();
  } else if (isEmergency) {
    addSystemMsg('🚨 Session escalated — emergency guidance given');
    enableInput(false);
    closeSubscription();
  } else if (evt.status === 'ABANDONED') {
    addSystemMsg('⚠️ Session abandoned due to repeated LLM failures');
    enableInput(false);
    closeSubscription();
  } else {
    enableInput(true);
  }
}

// ── GraphQL HTTP helper ───────────────────────────────────────────────────────
async function gql(query, variables = {}) {
  const url     = document.getElementById('server-url').value.trim();
  const profile = buildProfile();

  const res = await fetch(url, {
    method: 'POST',
    headers: {
      'Content-Type':   'application/json',
      'x-user-id':      document.getElementById('user-id').value.trim(),
      'x-user-profile': JSON.stringify(profile),
    },
    body: JSON.stringify({ query, variables }),
  });

  if (!res.ok) throw new Error(`HTTP ${res.status}: ${res.statusText}`);
  const json = await res.json();
  if (json.errors?.length) throw new Error(json.errors.map(e => e.message).join('\n'));
  return json.data;
}

function buildProfile() {
  const conditions = document.getElementById('conditions').value
    .split(',').map(s => s.trim()).filter(Boolean);

  const medications = document.getElementById('medications').value
    .split(',').map(s => s.trim()).filter(Boolean)
    .map(s => {
      const [name, dosage = ''] = s.split(':').map(x => x.trim());
      return { name, dosage };
    });

  const heightCm = Number(document.getElementById('height').value) || undefined;
  const weightKg = Number(document.getElementById('weight').value) || undefined;
  const bmi = (heightCm && weightKg)
    ? Math.round((weightKg / ((heightCm / 100) ** 2)) * 10) / 10
    : undefined;

  return {
    name:       document.getElementById('name').value.trim(),
    age:        Number(document.getElementById('age').value),
    sex:        document.getElementById('sex').value,
    language:   document.getElementById('language').value,
    city:       document.getElementById('city').value.trim(),
    heightCm, weightKg, bmi,
    conditions,
    medications,
  };
}

// ── Start session ─────────────────────────────────────────────────────────────
async function startSession() {
  setLoading(true);
  clearMessages();

  try {
    const data = await gql(`
      mutation StartSession {
        startSession {
          ... on DiagnosisSession {
            id stage status questionCount
          }
          ... on ProfileIncompleteError {
            message missingFields
          }
        }
      }
    `);

    const result = data.startSession;

    if (result.missingFields) {
      addSystemMsg(`⚠️ Profile incomplete: ${result.message}\nMissing: ${result.missingFields.join(', ')}`);
      setLoading(false);
      return;
    }

    sessionId     = result.id;
    sessionStage  = result.stage;
    sessionStatus = result.status;
    updateSidebar();

    // Open WebSocket subscription for this session
    openSubscription(sessionId);

    addSystemMsg(`✅ Session started  ·  ID: ${sessionId}`);
    addSystemMsg(`Background stages running… Subscription active — responses arrive via WebSocket.`);

    enableInput(true);

    addQuickMessages([
      'I have fever and headache',
      'My stomach hurts since morning',
      'I have a cough and cold for 3 days',
      'Feeling very tired and dizzy',
    ]);

  } catch (err) {
    addSystemMsg(`❌ Error: ${err.message}`);
  }
  setLoading(false);
}

// ── Send message ──────────────────────────────────────────────────────────────
async function sendMessage() {
  const input = document.getElementById('msg-input');
  const text  = input.value.trim();
  if (!text || !sessionId) return;

  input.value = '';
  autoResize(input);
  enableInput(false);
  addMessage('user', text);
  showTyping(true);

  try {
    // sendMessage now returns SendMessageAck { accepted, sessionId }
    // The actual response will arrive via subscription event
    await gql(`
      mutation SendMessage($sessionId: ID!, $message: String!) {
        sendMessage(sessionId: $sessionId, message: $message) {
          accepted sessionId
        }
      }
    `, { sessionId, message: text });

    // Typing indicator stays on until subscription event arrives
  } catch (err) {
    addSystemMsg(`❌ Error: ${err.message}`);
    showTyping(false);
    enableInput(true);
  }
}

// ── Reset ─────────────────────────────────────────────────────────────────────
function resetSession() {
  closeSubscription();
  sessionId     = null;
  sessionStage  = 0;
  sessionStatus = '';
  enableInput(false);
  clearMessages();
  updateSidebar();
  addSystemMsg('Session cleared. Configure profile and click Start Session.');
}

// ── UI helpers ────────────────────────────────────────────────────────────────
function clearMessages() {
  document.getElementById('messages').innerHTML = '';
  document.getElementById('typing').style.display = 'none';
}

function addMessage(role, text, cssClass) {
  const wrap = document.getElementById('messages');

  const div = document.createElement('div');
  const defaultClass = role === 'user' ? 'msg-user' : 'msg-ai';
  div.className = `msg ${cssClass ?? defaultClass}`;

  const header = document.createElement('div');
  header.className = 'msg-header';
  header.textContent = role === 'user' ? 'You' : 'Nova';
  div.appendChild(header);

  const body = document.createElement('div');
  body.innerHTML = renderMarkdownLite(text);
  div.appendChild(body);

  wrap.appendChild(div);
  scrollBottom();
}

function addSystemMsg(text) {
  const wrap = document.getElementById('messages');
  const div  = document.createElement('div');
  div.className = 'msg msg-sys';
  div.textContent = text;
  wrap.appendChild(div);
  scrollBottom();
}

function addQuickMessages(options) {
  const wrap = document.getElementById('messages');
  const div  = document.createElement('div');
  div.className = 'quick-msg';
  for (const opt of options) {
    const btn = document.createElement('button');
    btn.className = 'quick-btn';
    btn.textContent = opt;
    btn.onclick = () => {
      document.getElementById('msg-input').value = opt;
      div.remove();
      sendMessage();
    };
    div.appendChild(btn);
  }
  wrap.appendChild(div);
  scrollBottom();
}

function showTyping(show) {
  const t    = document.getElementById('typing');
  const msgs = document.getElementById('messages');
  t.style.display = show ? 'block' : 'none';
  if (show) msgs.appendChild(t);
  scrollBottom();
}

function scrollBottom() {
  const msgs = document.getElementById('messages');
  msgs.scrollTop = msgs.scrollHeight;
}

function enableInput(on) {
  document.getElementById('msg-input').disabled = !on;
  document.getElementById('send-btn').disabled  = !on;
  if (on) document.getElementById('msg-input').focus();
}

function setLoading(on) {
  const btn = document.getElementById('start-btn');
  btn.disabled = on;
  btn.innerHTML = on
    ? '<span class="spinner"></span>Starting…'
    : 'Start Session';
}

function updateSidebar(extra = {}) {
  document.getElementById('si-id').textContent     = sessionId ? sessionId.slice(-8) + '…' : '—';
  document.getElementById('si-stage').textContent  = sessionStage  || '—';
  document.getElementById('si-status').innerHTML   = sessionStatus ? badgeFor(sessionStatus) : '—';
  document.getElementById('si-action').textContent = extra.action || '—';

  if (sessionId) {
    document.getElementById('si-id').title = sessionId;
  }
}

function badgeFor(status) {
  const map = {
    IN_PROGRESS: ['badge-primary', 'In Progress'],
    COMPLETED:   ['badge-success', 'Completed'],
    ESCALATED:   ['badge-danger',  'Escalated'],
    ABANDONED:   ['badge-warn',    'Abandoned'],
  };
  const [cls, label] = map[status] ?? ['badge-primary', status];
  return `<span class="badge ${cls}">${label}</span>`;
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// Minimal markdown: **bold**, _italic_, bullet lines
function renderMarkdownLite(text) {
  return text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,     '<em>$1</em>')
    .replace(/_([^_]+)_/g,     '<em>$1</em>')
    .replace(/`([^`]+)`/g,     '<code style="background:#ffffff14;padding:1px 5px;border-radius:4px;font-size:12px">$1</code>')
    .replace(/^• (.+)$/gm,     '<span style="display:block;padding-left:14px">• $1</span>')
    .replace(/\n/g, '<br>');
}

// Init
updateSidebar();
setWsState('disconnected');
</script>
</body>
</html>
